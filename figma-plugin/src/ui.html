<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    /* ── Reset & base ─────────────────────────────────────────── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --color-bg: #ffffff;
      --color-surface: #f5f5f5;
      --color-border: #e5e5e5;
      --color-text: #1a1a2e;
      --color-text-muted: #6b7280;
      --color-primary: #6C47FF;
      --color-primary-hover: #5a35e6;
      --color-primary-fg: #ffffff;
      --color-destructive: #ef4444;
      --color-success: #16A34A;
      --color-success-bg: #DCFCE7;
      --color-fail: #9CA3AF;
      --color-fail-bg: #F3F4F6;
      --radius-button: 8px;
      --radius-card: 12px;
      --radius-badge: 6px;
    }

    /* Figma dark theme support */
    .figma-dark {
      --color-bg: #2c2c2c;
      --color-surface: #383838;
      --color-border: #4a4a4a;
      --color-text: #ffffff;
      --color-text-muted: #a0a0a0;
      --color-success-bg: #1a3a2a;
      --color-fail-bg: #3a3a3a;
    }

    html, body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      line-height: 1.4;
      color: var(--color-text);
      background: var(--color-bg);
      overflow-x: hidden;
    }

    /* ── Layout ───────────────────────────────────────────────── */
    .plugin {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 12px;
      gap: 12px;
    }

    .plugin-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--color-border);
    }

    .plugin-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .plugin-subtitle {
      font-size: 10px;
      color: var(--color-text-muted);
      font-weight: 500;
    }

    /* ── Palette swatches ─────────────────────────────────────── */
    .palette-row {
      display: flex;
      gap: 6px;
      min-height: 80px;
    }

    .swatch {
      flex: 1;
      border-radius: var(--radius-card);
      cursor: pointer;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 6px;
      gap: 3px;
      transition: transform 150ms ease, box-shadow 150ms ease;
      border: 1px solid rgba(0, 0, 0, 0.06);
    }

    .swatch:hover { transform: scale(1.03); }
    .swatch:active { transform: scale(0.98); }

    .swatch:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px var(--color-bg), 0 0 0 4px var(--color-primary);
    }

    .swatch-hex {
      font-size: 9px;
      font-weight: 600;
      font-family: 'SF Mono', 'Fira Code', monospace;
      text-transform: uppercase;
      opacity: 0.9;
      pointer-events: none;
    }

    /* WCAG contrast badge */
    .swatch-badge {
      font-size: 8px;
      font-weight: 700;
      padding: 1px 4px;
      border-radius: var(--radius-badge);
      pointer-events: none;
      line-height: 1.3;
      letter-spacing: 0.02em;
    }

    .swatch-badge-pass {
      background: var(--color-success-bg);
      color: var(--color-success);
    }

    .swatch-badge-fail {
      background: var(--color-fail-bg);
      color: var(--color-fail);
    }

    /* Lock icon */
    .swatch-lock {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 18px;
      height: 18px;
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.35);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      opacity: 0;
      transition: opacity 150ms;
    }

    .swatch:hover .swatch-lock,
    .swatch[data-locked="true"] .swatch-lock {
      opacity: 1;
    }

    .swatch[data-locked="true"] .swatch-lock {
      background: rgba(0, 0, 0, 0.55);
    }

    .swatch[data-locked="true"] {
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.4);
    }

    /* ── Controls ─────────────────────────────────────────────── */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .control-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .control-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--color-text-muted);
      min-width: 56px;
    }

    select, input[type="text"] {
      flex: 1;
      height: 32px;
      padding: 0 8px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-button);
      background: var(--color-surface);
      color: var(--color-text);
      font-size: 11px;
      font-family: inherit;
    }

    select:focus-visible, input:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px var(--color-primary);
      border-color: var(--color-primary);
    }

    /* ── Buttons ──────────────────────────────────────────────── */
    .btn {
      height: 36px;
      padding: 0 16px;
      border: none;
      border-radius: var(--radius-button);
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 150ms ease, transform 150ms ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn:active { transform: scale(0.98); }

    .btn:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px var(--color-bg), 0 0 0 4px var(--color-primary);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--color-primary);
      color: var(--color-primary-fg);
    }

    .btn-primary:hover:not(:disabled) { background: var(--color-primary-hover); }

    .btn-secondary {
      background: var(--color-surface);
      color: var(--color-text);
      border: 1px solid var(--color-border);
    }

    .btn-secondary:hover:not(:disabled) { background: var(--color-border); }

    .btn-full { width: 100%; }

    /* ── Action row ───────────────────────────────────────────── */
    .actions {
      display: flex;
      gap: 6px;
      margin-top: auto;
      padding-top: 8px;
      border-top: 1px solid var(--color-border);
    }

    .actions .btn {
      flex: 1;
      padding: 0 8px;
      font-size: 11px;
    }

    /* ── Status bar ───────────────────────────────────────────── */
    .status {
      font-size: 10px;
      color: var(--color-text-muted);
      text-align: center;
      padding: 4px 0;
    }

    .status-success { color: var(--color-success); }
    .status-error { color: var(--color-destructive); }

    /* ── Reduced motion ───────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="plugin" id="app">
    <header class="plugin-header">
      <span class="plugin-title">Paletta</span>
      <span class="plugin-subtitle">Color systems</span>
    </header>

    <div class="palette-row" id="palette-row" role="group" aria-label="Color palette">
      <!-- Swatches rendered by JS -->
    </div>

    <div class="controls">
      <div class="control-row">
        <label class="control-label" for="harmony-select">Harmony</label>
        <select id="harmony-select" aria-label="Harmony mode">
          <option value="random">Random</option>
          <option value="analogous">Analogous</option>
          <option value="monochromatic">Monochromatic</option>
          <option value="complementary">Complementary</option>
          <option value="triadic">Triadic</option>
        </select>
      </div>

      <div class="control-row">
        <label class="control-label" for="count-select">Colors</label>
        <select id="count-select" aria-label="Number of colors">
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5" selected>5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
        </select>
      </div>

      <div class="control-row">
        <label class="control-label" for="seed-input">Seed</label>
        <input type="text" id="seed-input" placeholder="#6C47FF (optional)" maxlength="7" aria-label="Seed color hex value">
      </div>

      <div class="control-row">
        <label class="control-label" for="prefix-input">Prefix</label>
        <input type="text" id="prefix-input" placeholder="Paletta" value="Paletta" aria-label="Variable collection prefix">
      </div>
    </div>

    <button class="btn btn-primary btn-full" id="generate-btn" aria-label="Generate new palette">
      Generate
    </button>

    <div class="actions">
      <button class="btn btn-secondary" id="apply-btn" aria-label="Apply palette colors to selected layers" disabled>
        Apply
      </button>
      <button class="btn btn-secondary" id="variables-btn" aria-label="Push colors as Figma variables">
        Variables
      </button>
      <button class="btn btn-secondary" id="extract-btn" aria-label="Extract colors from selected layers" disabled>
        Extract
      </button>
    </div>

    <div class="status" id="status" aria-live="polite"></div>
  </div>

  <!--JS_BUNDLE-->
</body>
</html>
